scenario_id: p2p_link_adaptation
name: Point-to-Point Link Adaptation
description: Two nodes establish a wireless link and adapt modulation/coding according to SNR variation.

total_steps: 120
step_interval_s: 0.1

channel:
  mode: linear_fading
  initial_snr_db: 18
  final_snr_db: 1
  seed: 42
  noise_std_db: 0.5

nodes:
  - node_id: gnb_1
    node_type: gNB
    name: gNB
    position:
      x: 0
      y: 0
    tx_power_dbm: 20

  - node_id: ue_1
    node_type: UE
    name: UE-1
    position:
      x: 120
      y: 30
    tx_power_dbm: 10

links:
  - link_id: link_gnb_ue1
    source_node_id: gnb_1
    target_node_id: ue_1
    active: true

link_offsets_db:
  link_gnb_ue1: 0